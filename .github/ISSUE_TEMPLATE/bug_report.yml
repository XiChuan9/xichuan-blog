name: Bug report
description: Report a reproducible problem in XiChuan Blog.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Vercel
        - Cloudflare
        - Local development
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the route, action, and expected result.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets before pasting logs.
      render: shell
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: e.g. 76a989b
