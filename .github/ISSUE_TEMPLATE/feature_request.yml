name: Feature request
description: Suggest an improvement for XiChuan Blog.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime impact
      options:
        - Vercel
        - Cloudflare
        - Both
        - Not runtime-specific
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context or tradeoffs.
